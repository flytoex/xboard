name: Sync Upstream (weekly)

on:
  schedule:
    - cron: "0 3 * * 1"   # 每周一 UTC 03:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/cedar2025/Xboard.git || true
          git fetch upstream
          git fetch origin

      # 把 upstream/master 合并到当前 master（在工作区产生变更，但不提交）
      - name: Merge upstream/master into local master (no commit)
        run: |
          git merge upstream/master --no-edit || true

      # 由 create-pull-request 自动创建分支并开 PR（base=master, branch=sync-upstream-YYYYMMDD）
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: master
          branch: sync-upstream-${{ github.run_id }}
          title: chore: sync upstream
          body: |
            Automated sync from cedar2025/Xboard upstream.
            Review changes and merge if safe.
          labels: upstream-sync
